<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Bank</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="profile">
                <span class="icon">👤</span>
                <span>Профиль</span>
            </button>
            <button class="nav-btn" data-page="transfer">
                <span class="icon">💸</span>
                <span>Переводы</span>
            </button>
            <button class="nav-btn" data-page="links">
                <span class="icon">🔗</span>
                <span>Ссылки</span>
            </button>
            <button class="nav-btn" data-page="history">
                <span class="icon">📊</span>
                <span>История</span>
            </button>
        </nav>

        <!-- Основной контент -->
        <main class="content">
            <!-- Страница профиля -->
            <div class="page active" id="profile-page">
                <div class="card-container">
                    <div class="bank-card">
                        <div class="card-gradient"></div>
                        <div class="card-content">
                            <div class="card-chip">💳</div>
                            <div class="card-number" id="card-number">**** **** **** 0000</div>
                            <div class="card-holder" id="card-holder">Имя Пользователя</div>
                            <div class="card-balance" id="card-balance">0 Aura</div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-label">ID:</span>
                        <span class="stat-value" id="user-id">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Username:</span>
                        <span class="stat-value" id="username">-</span>
                    </div>
                </div>
            </div>

            <!-- Страница переводов -->
            <div class="page" id="transfer-page">
                <h2>Перевод Aura</h2>
                
                <div class="form-group">
                    <label>Кому (Username или ID)</label>
                    <input type="text" id="recipient" placeholder="@username или 123456789">
                    <div id="recipient-preview" class="recipient-preview hidden">
                        <img id="preview-avatar" src="" alt="avatar">
                        <span id="preview-name"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" id="amount" placeholder="Введите сумму" min="1">
                </div>

                <div class="form-group">
                    <label>Тип перевода</label>
                    <div class="radio-group">
                        <label class="radio">
                            <input type="radio" name="anonymous" value="false" checked>
                            <span>Обычный (1%)</span>
                        </label>
                        <label class="radio">
                            <input type="radio" name="anonymous" value="true">
                            <span>Анонимный (3%)</span>
                        </label>
                    </div>
                </div>

                <button class="btn-primary" id="send-transfer">Отправить</button>
                <div id="transfer-result" class="result-message"></div>
            </div>

            <!-- Страница ссылок -->
            <div class="page" id="links-page">
                <h2>Платежные ссылки</h2>
                
                <div class="form-group">
                    <label>Сумма для получения</label>
                    <input type="number" id="link-amount" placeholder="Введите сумму" min="1">
                </div>

                <div class="form-group">
                    <label>Тип ссылки</label>
                    <div class="radio-group">
                        <label class="radio">
                            <input type="radio" name="link-anonymous" value="false" checked>
                            <span>Обычная</span>
                        </label>
                        <label class="radio">
                            <input type="radio" name="link-anonymous" value="true">
                            <span>Анонимная</span>
                        </label>
                    </div>
                </div>

                <button class="btn-primary" id="create-link">Создать ссылку</button>
                
                <div id="link-result" class="result-message"></div>
                <div id="link-display" class="link-display hidden">
                    <p>Ваша ссылка:</p>
                    <input type="text" id="generated-link" readonly>
                    <button class="btn-secondary" id="copy-link">Копировать</button>
                </div>
            </div>

            <!-- Страница истории -->
            <div class="page" id="history-page">
                <h2>История операций</h2>
                <div id="transactions-list" class="transactions-list">
                    <!-- Транзакции будут загружаться сюда -->
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
